<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official website of the Assistant Commissioner of Local Government Office, Hambantota. Serving the community through five specialized departments: Account, Establishment, Development, Investigation, and Engineering.">
    <meta name="keywords" content="ACLG Hambantota, Local Government, Hambantota District, Sri Lanka Government, Local Administration">
    <title>Assistant Commissioner of Local Government Office - Hambantota</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Landing Page -->
    <div class="landing-page">
        <div class="landing-overlay"></div>
        <div class="landing-content">
            <div class="logo-section">
                <i class="fas fa-landmark"></i>
            </div>
            <h1 class="office-title" data-translate="landing.title">Assistant Commissioner of Local Government Office</h1>
            <h2 class="location" data-translate="landing.location">Hambantota</h2>
            <p class="tagline" data-translate="landing.tagline">Serving the Community with Excellence</p>
            <a href="home.html" class="enter-btn">
                <span data-translate="landing.enterBtn">Enter Website</span>
                <i class="fas fa-arrow-right"></i>
            </a>
            <div class="language-selector">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="si">සිංහල</button>
                <button class="lang-btn" data-lang="ta">தமிழ்</button>
            </div>
            <div class="departments-preview">
                <div class="dept-item">
                    <i class="fas fa-calculator"></i>
                    <span data-translate="departments.account">Account</span>
                </div>
                <div class="dept-item">
                    <i class="fas fa-users"></i>
                    <span data-translate="departments.establishment">Establishment</span>
                </div>
                <div class="dept-item">
                    <i class="fas fa-chart-line"></i>
                    <span data-translate="departments.development">Development</span>
                </div>
                <div class="dept-item">
                    <i class="fas fa-search"></i>
                    <span data-translate="departments.investigation">Investigation</span>
                </div>
                <div class="dept-item">
                    <i class="fas fa-tools"></i>
                    <span data-translate="departments.engineering">Engineering</span>
                </div>
            </div>
        </div>
    </div>
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
